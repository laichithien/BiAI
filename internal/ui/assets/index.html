<!doctype html>
<html>
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta charset="utf-8" />
  <title>BiAI AgentDesk</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div id="topbar">
    <div class="brand">BiAI AgentDesk</div>
    <input id="workspace" type="text" placeholder="Thu muc du an, vi du C:\project" />
    <span id="status">San sang</span>
  </div>
  <div id="main">
    <div id="chat"></div>
    <div id="side">
      <h3>Cau hinh AI</h3>
      <label>API URL</label>
      <input id="llmBaseURL" class="sideInput" type="text" placeholder="https://api.openai.com/v1" />
      <label>Token</label>
      <input id="apiToken" class="sideInput" type="password" placeholder="Nhap token roi bam Tai model" />
      <label>Model</label>
      <select id="model" class="sideInput"></select>
      <button id="fetchModels" type="button">Tai model</button>
      <button id="saveSettings" type="button">Luu</button>
      <div id="settingsStatus" class="hint"></div>
      <pre id="settingsDetail" class="detail"></pre>
      <h3>Lenh nhanh</h3>
      <div class="hint">/list .</div>
      <div class="hint">/read file.txt</div>
      <div class="hint">/search tu_khoa</div>
      <div class="hint">/cmd go test ./...</div>
      <h3>Trang thai</h3>
      <div id="diag" class="hint">Loading...</div>
      <div id="events"></div>
    </div>
  </div>
  <div id="composer">
    <textarea id="prompt" placeholder="Nhap yeu cau hoac lenh nhanh..."></textarea>
    <button id="send" type="button">Gui</button>
  </div>
  <div id="approval" class="hidden">
    <div class="modal">
      <h3>Can xac nhan</h3>
      <div id="approvalBody"></div>
      <div class="actions">
        <button id="deny" type="button">Tu choi</button>
        <button id="allow" type="button">Cho phep mot lan</button>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
